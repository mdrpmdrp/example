<script>
  window.onload = function(){
    google.script.run.withSuccessHandler(dropDownList2).getDataList2()
  }
  //ดรอปดาวน์
  function dropDownList2(obj){
    var colA = document.getElementById('colE_edit')
    for(var x in obj[0]){
      if (x !== "") {
        colA.options[colA.options.length] = new Option(x,x)
      }
    }

    var colB = document.getElementById('colF_edit')
    for(var x in obj[1]){
      if (x !== "") {
        colB.options[colB.options.length] = new Option(x,x)
      }
    }

    var colC = document.getElementById('colH_edit')
    for(var x in obj[2]){
      if (x !== "") {
        colC.options[colC.options.length] = new Option(x,x)
      }
    }

    var colD = document.getElementById('colK_edit')
    for(var x in obj[3]){
      if (x !== "") {
        colD.options[colD.options.length] = new Option(x,x)
      }
    }
  }
</script>
