<style type="text/css">
  @import url('https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #f4efe7;
    --surface: rgba(255, 255, 255, 0.88);
    --surface-strong: #ffffff;
    --surface-muted: #f8f3ec;
    --text: #1f2a1f;
    --muted: #607060;
    --line: rgba(56, 88, 62, 0.14);
    --brand: #1f6b45;
    --brand-deep: #154c31;
    --accent: #d18b2f;
    --accent-soft: rgba(209, 139, 47, 0.16);
    --shadow: 0 24px 60px rgba(40, 52, 43, 0.12);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --select-arrow: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23607060' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
  }

  * {
    box-sizing: border-box;
    font-family: 'Noto Sans Thai', 'K2D', sans-serif;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    color: var(--text);
    background: linear-gradient(180deg, #efe6d6 0%, #f8f5ef 38%, #eef4ed 100%);
  }

  body {
    position: relative;
  }

  .page-shell {
    position: relative;
    overflow-x: clip;
  }

  .page-background::before,
  .page-background::after {
    content: '';
    position: fixed;
    inset: auto;
    border-radius: 999px;
    filter: blur(16px);
    z-index: 0;
    pointer-events: none;
  }

  .page-background::before {
    width: 360px;
    height: 360px;
    top: -120px;
    right: -100px;
    background: rgba(209, 139, 47, 0.18);
  }

  .page-background::after {
    width: 320px;
    height: 320px;
    left: -110px;
    bottom: 40px;
    background: rgba(31, 107, 69, 0.14);
  }

  .container {
    position: relative;
    z-index: 1;
  }

  .form-layout {
    display: grid;
    gap: 24px;
    align-items: start;
  }

  .hero-panel,
  .form-panel {
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }

  .hero-panel {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 22px;
    min-height: clamp(320px, 58svh, 520px);
    border-radius: var(--radius-xl);
    background:
      radial-gradient(circle at top right, rgba(209, 139, 47, 0.22), transparent 34%),
      linear-gradient(180deg, rgba(18, 80, 49, 0.96) 0%, rgba(20, 68, 46, 0.94) 100%);
    color: #f7f6f1;
  }

  .hero-content {
    display: grid;
    gap: 10px;
    align-content: start;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero-title {
    margin: 8px 0 4px;
    font-size: clamp(1.7rem, 2.7vw, 2.5rem);
    line-height: 1.16;
    font-weight: 700;
  }

  .hero-copy {
    margin: 0;
    max-width: 44ch;
    color: rgba(247, 246, 241, 0.86);
    line-height: 1.7;
  }

  .hero-position-card {
    margin-top: 8px;
    display: grid;
    gap: 12px;
    padding: 16px 18px;
    border-radius: var(--radius-lg);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .eyebrow {
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(247, 246, 241, 0.72);
    margin-bottom: 0;
  }

  .position-title {
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.5;
  }

  .position-title span {
    display: block;
    margin-top: 6px;
    color: rgba(247, 246, 241, 0.78);
    font-size: 0.98rem;
    font-weight: 400;
  }

  .status-banner {
    display: none;
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.14);
  }

  .form-panel {
    padding: 22px;
    border-radius: var(--radius-xl);
    background: var(--surface);
  }

  .form-panel-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }

  .form-panel-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: flex-end;
  }

  .btn-mock-fill {
    display: inline-flex;
    gap: 8px;
    align-items: center;
    border-radius: 999px;
    padding: 0.7rem 1rem;
    font-weight: 600;
    border-color: rgba(31, 107, 69, 0.18);
    color: var(--brand-deep);
    background: #fff;
  }

  .btn-mock-fill:hover,
  .btn-mock-fill:focus {
    border-color: rgba(31, 107, 69, 0.3);
    color: var(--brand-deep);
    background: rgba(31, 107, 69, 0.06);
  }

  .section-kicker {
    margin-bottom: 6px;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brand);
    font-weight: 700;
  }

  .panel-title {
    margin: 0;
    font-size: clamp(1.4rem, 2.3vw, 2rem);
    font-weight: 700;
  }

  .required-note {
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--surface-muted);
    color: var(--muted);
    font-size: 0.92rem;
  }

  #myForm {
    display: grid;
    gap: 20px;
  }

  .form-section {
    padding: 20px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid var(--line);
  }

  .section-heading {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .section-number {
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--brand) 0%, #2f8c61 100%);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 12px 24px rgba(31, 107, 69, 0.2);
  }

  .section-heading h3 {
    margin: 2px 0 4px;
    font-size: 1.12rem;
    font-weight: 700;
  }

  .section-heading p {
    margin: 0;
    color: var(--muted);
    line-height: 1.6;
  }

  .subsection-title {
    margin-bottom: 14px;
    font-weight: 700;
    color: var(--brand-deep);
  }

  .form-label {
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text);
  }

  .form-control,
  .form-select {
    min-height: 50px;
    padding: 0.78rem 0.95rem;
    border-radius: var(--radius-md);
    border: 1px solid rgba(56, 88, 62, 0.18);
    background: rgba(255, 255, 255, 0.96);
    color: var(--text);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }

  .form-select {
    padding-right: 2.8rem;
    background-image: var(--select-arrow);
    background-repeat: no-repeat;
    background-position: right 0.95rem center;
    background-size: 14px 10px;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: rgba(31, 107, 69, 0.48);
    box-shadow: 0 0 0 4px rgba(31, 107, 69, 0.12);
  }

  .field-help {
    margin-top: 8px;
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .field-error {
    display: none;
    margin-top: 8px;
    font-size: 0.86rem;
    font-weight: 500;
    color: #cf4d4d;
    line-height: 1.45;
  }

  .field-error.is-visible {
    display: block;
  }

  .swal2-popup.rounded.rounded-4 {
    border: 1px solid rgba(56, 88, 62, 0.12);
    border-radius: 24px !important;
    padding: 1.5rem !important;
    box-shadow: 0 28px 60px rgba(31, 42, 31, 0.18);
  }

  .swal2-title {
    font-size: 1.35rem !important;
    font-weight: 700 !important;
    color: var(--text) !important;
  }

  .swal2-html-container {
    margin-top: 0.9rem !important;
  }

  .review-summary {
    display: grid;
    gap: 14px;
    text-align: left;
  }

  .success-view {
    display: grid;
    gap: 22px;
  }

  .success-hero {
    display: grid;
    gap: 10px;
    justify-items: center;
    text-align: center;
    padding: 24px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(31, 107, 69, 0.1) 0%, rgba(255, 255, 255, 0.92) 100%);
    border: 1px solid rgba(31, 107, 69, 0.14);
  }

  .success-icon {
    width: 68px;
    height: 68px;
    display: inline-grid;
    place-items: center;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--brand) 0%, #2f8c61 100%);
    color: #fff;
    box-shadow: 0 18px 32px rgba(31, 107, 69, 0.18);
    font-size: 1.85rem;
  }

  .success-title {
    margin: 0;
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    font-weight: 700;
    color: var(--brand-deep);
  }

  .success-copy {
    margin: 0;
    max-width: 42ch;
    color: var(--muted);
    line-height: 1.7;
  }

  .success-meta-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  }

  .success-meta-card {
    display: grid;
    gap: 6px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(248, 243, 236, 0.82);
    border: 1px solid rgba(56, 88, 62, 0.12);
  }

  .success-meta-label {
    color: var(--muted);
    font-size: 0.88rem;
  }

  .success-meta-value {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }

  .success-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .success-pdf-button {
    min-width: min(100%, 280px);
    justify-content: center;
    text-decoration: none;
  }

  .success-pdf-button.disabled,
  .success-pdf-button[aria-disabled='true'] {
    pointer-events: none;
    opacity: 1;
    background: linear-gradient(135deg, rgba(139, 154, 139, 0.82) 0%, rgba(96, 112, 96, 0.92) 100%);
    border-color: rgba(96, 112, 96, 0.18);
    color: #fff;
  }

  .success-pdf-button.is-ready {
    background: linear-gradient(135deg, var(--brand) 0%, #2f8c61 100%);
    border-color: rgba(31, 107, 69, 0.24);
  }

  .success-pdf-button.is-error {
    background: linear-gradient(135deg, #b75b5b 0%, #cf4d4d 100%);
    border-color: rgba(207, 77, 77, 0.2);
  }

  .review-intro {
    margin: 0;
    color: var(--muted);
    font-size: 0.94rem;
    line-height: 1.6;
  }

  .review-section {
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(248, 243, 236, 0.72);
    border: 1px solid rgba(56, 88, 62, 0.12);
  }

  .review-section-title {
    margin: 0 0 10px;
    color: var(--brand-deep);
    font-size: 0.98rem;
    font-weight: 700;
  }

  .review-photo-card {
    display: grid;
    gap: 10px;
    margin-bottom: 14px;
  }

  .review-photo-frame {
    width: min(220px, 100%);
    aspect-ratio: 3 / 4;
    overflow: hidden;
    border-radius: 18px;
    border: 1px solid rgba(31, 107, 69, 0.14);
    background: rgba(31, 107, 69, 0.05);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
  }

  .review-photo-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .review-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .review-item {
    display: grid;
    gap: 4px;
  }

  .review-label {
    color: var(--muted);
    font-size: 0.84rem;
  }

  .review-value {
    color: var(--text);
    font-size: 0.96rem;
    line-height: 1.5;
    word-break: break-word;
  }

  @media (max-width: 767.98px) {
    .success-hero {
      padding: 20px;
    }

    .success-actions {
      display: grid;
      grid-template-columns: 1fr;
    }

    .success-pdf-button {
      min-width: 100%;
    }

    .review-grid {
      grid-template-columns: 1fr;
    }
  }

  .upload-progress-overview {
    margin-bottom: 16px;
    padding: 16px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(31, 107, 69, 0.08) 0%, rgba(209, 139, 47, 0.08) 100%);
    border: 1px solid rgba(31, 107, 69, 0.12);
    text-align: left;
  }

  .upload-progress-overview-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    color: var(--brand-deep);
    font-size: 0.96rem;
  }

  .upload-progress-caption {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.55;
  }

  .upload-progress-list {
    display: grid;
    gap: 12px;
    text-align: left;
  }

  .upload-progress-row {
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(248, 243, 236, 0.72);
    border: 1px solid rgba(56, 88, 62, 0.12);
  }

  .upload-progress-row-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .upload-progress-meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .upload-progress-dot {
    width: 10px;
    height: 10px;
    flex: 0 0 auto;
    border-radius: 999px;
    background: rgba(96, 112, 96, 0.4);
  }

  .upload-progress-label {
    color: var(--text);
    font-weight: 600;
  }

  .upload-progress-row strong[data-role='status'] {
    color: var(--muted);
    font-size: 0.92rem;
    font-weight: 600;
  }

  .upload-progress-track {
    position: relative;
    overflow: hidden;
    height: 10px;
    border-radius: 999px;
    background: rgba(56, 88, 62, 0.12);
  }

  .upload-progress-track-overall {
    height: 12px;
    background: rgba(31, 107, 69, 0.12);
  }

  .upload-progress-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0;
    border-radius: inherit;
    background: linear-gradient(90deg, #8ba193 0%, #9eafa4 100%);
    transition: width 0.28s ease, background 0.28s ease;
  }

  .upload-progress-fill[data-state='active'] {
    background: linear-gradient(90deg, var(--accent) 0%, #ebb04d 100%);
  }

  .upload-progress-fill[data-state='complete'] {
    background: linear-gradient(90deg, var(--brand) 0%, #2f8c61 100%);
  }

  .upload-progress-fill[data-state='error'] {
    background: linear-gradient(90deg, #cf4d4d 0%, #e96b6b 100%);
  }

  .upload-progress-row[data-state='active'] {
    background: rgba(209, 139, 47, 0.08);
    border-color: rgba(209, 139, 47, 0.22);
  }

  .upload-progress-row[data-state='active'] .upload-progress-dot {
    background: var(--accent);
    box-shadow: 0 0 0 6px rgba(209, 139, 47, 0.16);
  }

  .upload-progress-row[data-state='complete'] {
    background: rgba(31, 107, 69, 0.08);
    border-color: rgba(31, 107, 69, 0.2);
  }

  .upload-progress-row[data-state='complete'] .upload-progress-dot {
    background: var(--brand);
    box-shadow: 0 0 0 6px rgba(31, 107, 69, 0.14);
  }

  .upload-progress-row[data-state='error'] {
    background: rgba(207, 77, 77, 0.07);
    border-color: rgba(207, 77, 77, 0.22);
  }

  .upload-progress-row[data-state='error'] .upload-progress-dot {
    background: #cf4d4d;
    box-shadow: 0 0 0 6px rgba(207, 77, 77, 0.14);
  }

  .radio-card-wrap {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .radio-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid rgba(56, 88, 62, 0.16);
    background: #fff;
    cursor: pointer;
    transition: all 0.2s ease;
    overflow: hidden;
  }

  .radio-card input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .radio-card span {
    font-weight: 600;
  }

  .radio-card:has(input:checked) {
    border-color: rgba(31, 107, 69, 0.48);
    background: rgba(31, 107, 69, 0.08);
    box-shadow: inset 0 0 0 1px rgba(31, 107, 69, 0.08);
  }

  .radio-group.is-invalid .radio-card-wrap {
    padding: 10px;
    border-radius: 18px;
    border: 1px solid rgba(207, 77, 77, 0.32);
    box-shadow: 0 0 0 4px rgba(207, 77, 77, 0.12);
    background: rgba(207, 77, 77, 0.03);
  }

  .conditional-panel {
    padding: 18px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(31, 107, 69, 0.05) 0%, rgba(255, 255, 255, 0.82) 100%);
    border: 1px dashed rgba(31, 107, 69, 0.26);
  }

  .upload-card {
    height: 100%;
    padding: 18px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(248, 243, 236, 0.9) 100%);
    border: 1px solid var(--line);
  }

  .upload-card-body {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .upload-content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  .upload-content-full {
    width: 100%;
  }

  .upload-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }

  .file-input-native {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .upload-select-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 48px;
    padding: 0.8rem 1rem;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(31, 107, 69, 0.1) 0%, rgba(31, 107, 69, 0.16) 100%);
    border: 1px solid rgba(31, 107, 69, 0.18);
    color: var(--brand-deep);
    font-weight: 700;
  }

  .upload-select-btn:hover,
  .upload-select-btn:focus {
    background: linear-gradient(135deg, rgba(31, 107, 69, 0.16) 0%, rgba(31, 107, 69, 0.24) 100%);
    border-color: rgba(31, 107, 69, 0.28);
    color: var(--brand-deep);
    box-shadow: 0 0 0 4px rgba(31, 107, 69, 0.08);
  }

  .upload-file-name {
    min-width: 0;
    color: var(--muted);
    font-size: 0.94rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .upload-card.has-file .upload-file-name {
    color: var(--text);
    font-weight: 600;
  }

  .upload-preview {
    position: relative;
    flex: 0 0 160px;
    width: 160px;
    aspect-ratio: 3 / 4;
    border-radius: 18px;
    overflow: hidden;
    border: 1px dashed rgba(31, 107, 69, 0.18);
    background: rgba(31, 107, 69, 0.05);
  }

  .upload-preview-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .upload-preview-placeholder {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    gap: 8px;
    padding: 16px;
    text-align: center;
    color: var(--muted);
    background: linear-gradient(180deg, rgba(31, 107, 69, 0.04) 0%, rgba(255, 255, 255, 0.58) 100%);
  }

  .upload-preview-placeholder i {
    font-size: 1.6rem;
    color: var(--brand);
  }

  .upload-preview.is-empty .upload-preview-image {
    display: none;
  }

  .upload-preview:not(.is-empty) .upload-preview-placeholder {
    display: none;
  }

  .upload-card.is-invalid {
    border-color: rgba(207, 77, 77, 0.3);
    box-shadow: 0 0 0 4px rgba(207, 77, 77, 0.08);
  }

  .upload-card.is-invalid .upload-select-btn {
    border-color: rgba(207, 77, 77, 0.34);
    color: #a93c3c;
    background: linear-gradient(135deg, rgba(207, 77, 77, 0.08) 0%, rgba(207, 77, 77, 0.14) 100%);
  }

  .submit-bar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-top: 22px;
    padding: 18px 20px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(31, 107, 69, 0.08) 0%, rgba(209, 139, 47, 0.12) 100%);
