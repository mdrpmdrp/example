    //get File for Upload **************************************
    var filedatas = {}
    function getFileForUpload() {
      $('#myFile_add, #myFile_edit,#myFile_add_2, #myFile_edit_2,#myFile_add_3, #myFile_edit_3,#myFile_add_4, #myFile_edit_4').on('change', function () {
        let id = $(this).prop('id')
        filedatas[id] = {}
        let file = $(this)[0].files[0]
        let fs = new FileReader()
        fs.onloadend = (e) => {
          filedatas[id].data = e.target.result
          filedatas[id].name = file.name
          if (id == 'myFile_edit') $('#preview-edit').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_edit_2') $('#preview-edit-2').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_edit_3') $('#preview-edit-3').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_edit_4') $('#preview-edit-4').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_add_2') $('#preview-2').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_add_3') $('#preview-3').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_add_4') $('#preview-4').prop('src', filedatas[id].data).show(200)
          else $('#preview').prop('src', filedatas[id].data).show(200)
          console.log(filedatas)
        }
        fs.readAsDataURL(file)
      })

    }

    // DELETE RECORD  **********************************
    function deleteRecord() {
      loadingStart()
      const id = document.getElementById('customer_id_edit').value
      elements.table.deleteRow(id)
    };

    // ALERT ***********************************
    function emptyAlert() {
      Swal.fire({
        icon: 'error',
        title: 'Oops...',
        text: 'กรุณากรอกให้ครบทุกช่อง',
      })
    };

    function deleteSuccessAlert() {
      Swal.fire(
        'การลบข้อมูล!',
        'เรียบร้อยแล้ว'
      )
    };


    function confirmDeleteAlert() {
      Swal.fire({
        title: 'คุณแน่ใจที่จะลบ?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes!'
      }).then((result) => {
        if (result.isConfirmed) {
          deleteRecord();
        }
      })
    };

    function addCompleteAlert() {
      loadData()
      Swal.fire(
        'เพิ่มข้อมูล!',
        'เรียบร้อยแล้ว'
      )
    };

    function editCompleteAlert() {
      // loadData()
      Swal.fire(
        'แก้ไขข้อมูล!',
        'เรียบร้อยแล้ว'
      )
    };

    function clickEventHandler(e) {
      const target = e.target;
      // Prevent click event for input, select, textarea inside #app
      if (["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName)) {
        return;
      }
      switch (true) {
        case target.matches("#open-form-record-button"):
          filedatas = {};
          openFormRecord();
          break;
        case target.matches("#add-record-button"):
          const requiredFields = [
            "colC_add",
            "colD_add",
            "colE_add",
            "colF_add",
            "colG_add",
            "colH_add",
            "colI_add",
            "colK_add"
          ];
          const isEmpty = requiredFields.some(id => !document.getElementById(id).value);
          if (isEmpty) {
            emptyAlert();
          } else {
            addRecord(e);
          }
          break;
        case target.matches("#edit-record-button"):
          editRecord(e);
          break;
        case target.matches("#delete-record-button"):
          confirmDeleteAlert();
          break;
        case target.matches("#download-excel-button"):
          downloadExcel(e);
          break;
        default:
          break;
      }
    }
    function searchData(e) {
      let jobNo = document.getElementById("filter-diagGroup-input").value
      let searchText = document.getElementById("search-input").value.trim()
      console.log("🚀 ~ searchData ~ jobNo:", jobNo)
      console.log("🚀 ~ searchData ~ searchText:", searchText)
      if (jobNo != "" && searchText != "") {
        elements.table.setFilter(function(data) {
          return (
            data["JobNo"] == jobNo && (
              (data["ตำแหน่งงาน"] && data["ตำแหน่งงาน"].includes(searchText)) ||
              (data["หัวข้อประกาศ"] && data["หัวข้อประกาศ"].includes(searchText)) ||
              (data["ประเภทตำแหน่ง"] && data["ประเภทตำแหน่ง"].includes(searchText))
            )
          );
        });
      } else if (jobNo != "" && searchText == "") {
        elements.table.setFilter("JobNo", "=", jobNo)
      } else if (jobNo == "" && searchText != "") {
        elements.table.setFilter(function(data) {
          return (
            (data["ตำแหน่งงาน"] && data["ตำแหน่งงาน"].includes(searchText)) ||
            (data["หัวข้อประกาศ"] && data["หัวข้อประกาศ"].includes(searchText)) ||
            (data["ประเภทตำแหน่ง"] && data["ประเภทตำแหน่ง"].includes(searchText))
          );
        });
      } else {
        elements.table.clearFilter()
      }
    };


    document.getElementById("app").addEventListener("click", clickEventHandler);
    document.getElementById("search-input").addEventListener("input", searchData);
    document.getElementById("filter-diagGroup-input").addEventListener("change", searchData);
    document.addEventListener('DOMContentLoaded', pageLoad)

  </script>
