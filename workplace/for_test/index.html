<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <base target="_top">
    <style>
      body{
        font-family:"Segoe UI",Tahoma,sans-serif;
        background:#f5f5f5;
        margin:0;
        padding:16px;
      }
      h1{
        text-align:center;
        margin-top:0;
      }

      .toolbar{
        display:flex;
        justify-content:center;
        align-items:center;
        gap:8px;
        margin-bottom:12px;
        flex-wrap:wrap;
      }

      .cards{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
        gap:10px;
      }

      .card{
        background:#fff;
        border-radius:10px;
        padding:12px;
        box-shadow:0 2px 5px rgba(0,0,0,.08);
        font-size:13px;
      }

      .card-header{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        margin-bottom:4px;
      }

      .name{
        font-weight:bold;
        font-size:15px;
      }

      .badge{
        padding:2px 8px;
        border-radius:20px;
        font-size:11px;
      }
      .wait{background:#fff3cd;color:#856404;}
      .ok  {background:#d4edda;color:#155724;}
      .no  {background:#f8d7da;color:#721c24;}

      .row span.label{
        font-weight:600;
      }

      .actions{
        margin-top:8px;
        display:flex;
        gap:6px;
      }

      .btn{
        flex:1;
        padding:6px;
        border:none;
        border-radius:6px;
        font-weight:bold;
        color:#fff;
        cursor:pointer;
      }
      .approve{background:#2e7d32;}  /* ปุ่มอนุมัติ สีเขียว */
      .reject {background:#c62828;}  /* ปุ่มไม่อนุมัติ สีแดง */

      .btn:disabled{
        opacity:.6;
        cursor:default;
      }
    </style>
  </head>
  <body>
    <h1>การอนุมัติการลางานพนักงานขับรถ LACO</h1>

    <div class="toolbar">
      <label>สถานะการอนุมัติ:</label>
      <select id="filter">
        <option value="ALL">ทั้งหมด</option>
        <option value="WAIT">รออนุมัติ</option>
        <option value="OK">อนุมัติ</option>
        <option value="NO">ไม่อนุมัติ</option>
      </select>
    </div>

    <div id="cards" class="cards">
      <? var list = rows || []; ?>
      <? for (var i = 0; i < list.length; i++) {
           var item = list[i];
           var status = item.status || '';
           var textStatus = status || 'รออนุมัติ';
           var cls = 'wait';
           if (status === 'อนุมัติ') cls = 'ok';
           else if (status === 'ไม่อนุมัติ') cls = 'no';
      ?>
        <div class="card"
             data-status="<?= status ? (status === 'อนุมัติ' ? 'OK' : 'NO') : 'WAIT' ?>"
             data-row="<?= item.row ?>">
          <div class="card-header">
            <div class="name"><?= item.name || '-' ?></div>
            <div class="badge <?= cls ?>"><?= textStatus ?></div>
          </div>
          <div class="row"><span class="label">ทะเบียน:</span> <?= item.plate || '-' ?></div>
          <div class="row"><span class="label">ประเภทการลา:</span> <?= item.type || '-' ?></div>
          <div class="row"><span class="label">ประเภทงาน:</span> <?= item.jobType || '-' ?></div>
          <div class="row"><span class="label">เริ่ม:</span> <?= item.start || '-' ?></div>
          <div class="row"><span class="label">สิ้นสุด:</span> <?= item.end || '-' ?></div>
          <div class="row"><span class="label">จำนวนวัน:</span> <?= item.days || '-' ?></div>
          <div class="row"><span class="label">หมายเหตุ:</span> <?= item.note || '-' ?></div>
          <div class="actions">
            <button class="btn approve">อนุมัติ</button>
            <button class="btn reject">ไม่อนุมัติ</button>
          </div>
        </div>
      <? } ?>
    </div>

    <script>
      // ฟังก์ชันกรองการ์ดตาม dropdown
      const filterSelect = document.getElementById('filter');
      const cards = document.querySelectorAll('.card');

      function applyFilter(){
        const v = filterSelect.value; // ALL / WAIT / OK / NO
        cards.forEach(c=>{
          const st = c.getAttribute('data-status');
          if (v === 'ALL' || v === st) {
            c.style.display = '';
          } else {
            c.style.display = 'none';
          }
        });
      }

      filterSelect.addEventListener('change', applyFilter);
      applyFilter();

      // คลิกอนุมัติ/ไม่อนุมัติ
      cards.forEach(c=>{
        const row = Number(c.getAttribute('data-row'));
        const approveBtn = c.querySelector('.approve');
        const rejectBtn  = c.querySelector('.reject');

        approveBtn.addEventListener('click', ()=>{
          approveBtn.disabled = true;
          rejectBtn.disabled = true;
          google.script.run.withSuccessHandler(()=>location.reload())
            .updateStatus(row,'อนุมัติ');
        });

        rejectBtn.addEventListener('click', ()=>{
          approveBtn.disabled = true;
          rejectBtn.disabled = true;
          google.script.run.withSuccessHandler(()=>location.reload())
            .updateStatus(row,'ไม่อนุมัติ');
        });
      });
    </script>
  </body>
</html>
