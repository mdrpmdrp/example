    //get File for Upload **************************************
    var filedatas = {}
    function getFileForUpload() {
      $('#myFile_add, #myFile_edit,#myFile_add_2, #myFile_edit_2, #myFile_add_3, #myFile_edit_3').on('change', function () {
        let id = $(this).prop('id')
        filedatas[id] = {}
        let file = $(this)[0].files[0]
        let fs = new FileReader()
        fs.onloadend = (e) => {
          filedatas[id].data = e.target.result
          filedatas[id].name = file.name
          if (id == 'myFile_edit') $('#preview-edit').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_edit_2') $('#preview-edit-2').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_edit_3') $('#preview-edit-3').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_add_2') $('#preview-2').prop('src', filedatas[id].data).show(200)
          else if (id == 'myFile_add_3') $('#preview-3').prop('src', filedatas[id].data).show(200)
          else $('#preview').prop('src', filedatas[id].data).show(200)
          console.log(filedatas)
        }
        fs.readAsDataURL(file)
      })

    }

    function clickEventHandler(e) {
      const target = e.target;
      // Prevent click event for input, select, textarea inside #app
      if (["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName)) {
        return;
      }
      switch (true) {
        case target.matches("#open-form-record-button"):
          filedatas = {};
          openFormRecord();
          break;
        case target.matches("#add-record-button"):
          const requiredFields = [
            "colC_add",
            "colD_add",
            "colE_add",
            "colF_add",
            "colG_add",
            "colH_add",
            "colI_add",
            "colK_add"
          ];
          const isEmpty = requiredFields.some(id => !document.getElementById(id).value);
          if (isEmpty) {
            emptyAlert();
          } else {
            addRecord(e);
          }
          break;
        case target.matches("#edit-record-button"):
          editRecord(e);
          break;
        case target.matches("#delete-record-button"):
          confirmDeleteAlert();
          break;
        case target.matches("#download-excel-button"):
          downloadExcel(e);
          break;
        default:
          break;
      }
    }

    function searchData(e) {
      let searchText = document.getElementById("search-input").value.trim()
      console.log("🚀 ~ searchData ~ searchText:", searchText)
      if (searchText != "") {
        elements.table.setFilter(function (data) {
          return (
            (data["ชื่อ"].toLowerCase().includes(searchText.toLowerCase())) ||
            (data["นามสกุล"].toLowerCase().includes(searchText.toLowerCase())) ||
            (data["ตำแหน่ง"].toLowerCase().includes(searchText.toLowerCase()))
          );
        });
      } else {
        elements.table.clearFilter()
      }
    };

    document.getElementById("app").addEventListener("click", clickEventHandler);
    document.getElementById("search-input").addEventListener("input", searchData);
    document.addEventListener('DOMContentLoaded', pageLoad)

  </script>
