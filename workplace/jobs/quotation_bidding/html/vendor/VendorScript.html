        function submitLogin(form) {
            setLoading(true);
            callServer('loginUser', formToObject(form)).then(function (response) {
                state.token = response.token;
                storageSet(SESSION_KEY, response.token);
                storageSet(SESSION_ROLE_KEY, response.role);
                state.role = response.role;
                state.user = response.user;
                state.data = null;
                renderWorkspace();
                flash('Success', 'Signed in successfully.', 'success', false);
                setLoading(false);
                callServer('finalizeLoginSession', response.token).then(function (result) {
                    if (result && result.user) {
                        state.user = result.user;
                    }
                }).catch(function () { });
                refreshBootstrap({ silent: true });
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function submitRegister(form) {
            setLoading(true);
            validateRegistrationAvailability(form).then(function () {
                return callServer('registerVendor', formToObject(form));
            }).then(function (response) {
                flash('Success', response.message, 'success', false);
                form.reset();
                resetRegistrationAvailability();
                switchAuthMode('login');
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function checkRegistrationField(fieldName) {
            const $form = $('#registerForm');
            const payload = {
                username: $form.find('[name="username"]').val(),
                email: $form.find('[name="email"]').val()
            };
            const value = String(payload[fieldName] || '').trim();

            if (!value) {
                clearRegistrationFieldState(fieldName);
                return Promise.resolve();
            }

            return callServer('checkRegistrationAvailability', payload).then(function (response) {
                applyRegistrationAvailability('username', response.usernameAvailable, response.usernameMessage);
                applyRegistrationAvailability('email', response.emailAvailable, response.emailMessage);
            }).catch(function (error) {
                clearRegistrationFieldState(fieldName);
                throw error;
            });
        }

        function validateRegistrationAvailability(form) {
            return callServer('checkRegistrationAvailability', formToObject(form)).then(function (response) {
                applyRegistrationAvailability('username', response.usernameAvailable, response.usernameMessage);
                applyRegistrationAvailability('email', response.emailAvailable, response.emailMessage);

                if (!response.usernameAvailable || !response.emailAvailable) {
                    throw new Error(response.usernameAvailable ? response.emailMessage : response.usernameMessage);
                }
            });
        }

        function applyRegistrationAvailability(fieldName, isAvailable, message) {
            state.registerAvailability[fieldName] = isAvailable;
            const hintId = fieldName === 'username' ? '#registerUsernameHint' : '#registerEmailHint';
            $(hintId)
                .removeClass('hidden text-emerald-600 text-rose-600')
                .addClass(isAvailable ? 'text-emerald-600' : 'text-rose-600')
                .text(message || '');
        }

        function clearRegistrationFieldState(fieldName) {
            state.registerAvailability[fieldName] = null;
            const hintId = fieldName === 'username' ? '#registerUsernameHint' : '#registerEmailHint';
            $(hintId).addClass('hidden').removeClass('text-emerald-600 text-rose-600').text('');
        }

        function resetRegistrationAvailability() {
            clearRegistrationFieldState('username');
            clearRegistrationFieldState('email');
        }

        function submitRequestReset(form) {
            const payload = formToObject(form);
            setLoading(true);
            callServer('requestPasswordReset', payload).then(function (response) {
                state.resetFlow.email = payload.email;
                state.resetFlow.otpRequested = true;
                state.resetFlow.otpVerified = false;
                state.resetFlow.otp = '';
                updateResetFlowUi();
                flash('Success', response.message, 'success', false);
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function submitVerifyResetOtp(form) {
            const payload = formToObject(form);
            setLoading(true);
            callServer('verifyPasswordResetOtp', payload).then(function (response) {
                state.resetFlow.email = payload.email;
                state.resetFlow.otp = payload.otp;
                state.resetFlow.otpRequested = true;
                state.resetFlow.otpVerified = true;
                updateResetFlowUi();
                flash('Success', response.message, 'success', true);
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function submitResetPassword(form) {
            const payload = formToObject(form);
            setLoading(true);
            callServer('resetPasswordWithOtp', payload).then(function () {
                flash('Success', 'Password has been reset successfully.', 'success', true);
                resetPasswordFlow();
                $('#requestResetForm')[0].reset();
                $('#verifyResetOtpForm')[0].reset();
                form.reset();
                switchAuthMode('login');
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function updateResetFlowUi() {
            const isResetMode = state.authMode === 'reset';
            $('#requestResetForm').toggleClass('hidden', !isResetMode || state.resetFlow.otpRequested);
            $('#verifyResetOtpForm').toggleClass('hidden', !isResetMode || !state.resetFlow.otpRequested || state.resetFlow.otpVerified);
            $('#resetPasswordForm').toggleClass('hidden', !isResetMode || !state.resetFlow.otpVerified);
            $('#resetStepRequest').toggleClass('hidden', !isResetMode || state.resetFlow.otpRequested);
            $('#resetStepVerify').toggleClass('hidden', !isResetMode || !state.resetFlow.otpRequested || state.resetFlow.otpVerified);
            $('#resetStepPassword').toggleClass('hidden', !isResetMode || !state.resetFlow.otpVerified);

            if (state.resetFlow.email) {
                $('#verifyResetOtpForm [name="email"]').val(state.resetFlow.email);
                $('#resetPasswordForm [name="email"]').val(state.resetFlow.email);
            }

            if (state.resetFlow.otp) {
                $('#resetPasswordForm [name="otp"]').val(state.resetFlow.otp);
            }

            $('#resetFlowHint')
                .text(
                    state.resetFlow.otpVerified
                        ? 'OTP verified. Set your new password below.'
                        : state.resetFlow.otpRequested
                            ? 'Enter the OTP sent to your email to continue.'
                            : 'Enter your registered email address to receive an OTP.'
                );
        }

        function resetPasswordFlow() {
            state.resetFlow = {
                email: '',
                otp: '',
                otpRequested: false,
                otpVerified: false
            };
            if ($('#verifyResetOtpForm').length) {
                $('#verifyResetOtpForm')[0].reset();
            }
            if ($('#resetPasswordForm').length) {
                $('#resetPasswordForm')[0].reset();
            }
            if ($('#requestResetForm').length && state.authMode !== 'reset') {
                $('#requestResetForm')[0].reset();
            }
        }

        function submitWorkOrder(form) {
            const workOrderUploadError = getUploadBlockingMessage(state.newWorkOrderFiles, 'attachments');
            if (workOrderUploadError) {
                flash('Upload Incomplete', workOrderUploadError, 'error', true);
                return;
            }
            const payload = formToObject(form);
            const isNewWorkOrder = !payload.workOrderId;
            payload.existingAttachments = JSON.stringify((state.workOrderDraft && state.workOrderDraft.attachments) || []);
            payload.newAttachments = normalizeUploadedEntries(state.newWorkOrderFiles);
            setLoading(true);
            callServer('saveWorkOrder', state.token, payload).then(function (response) {
                state.workOrderDraft = null;
                state.newWorkOrderFiles = [];
                fillWorkOrderForm(null);
                closeWorkOrderModal();
                flash('Success', 'Work order saved successfully.', 'success', true);
                refreshBootstrap({ silent: true });
                if (isNewWorkOrder && response && response.workOrder && response.workOrder.workOrderId) {
                    notifyWorkOrderSuppliers(response.workOrder.workOrderId);
                }
                if (response && response.finalizeJob) {
                    callServer('finalizeWorkOrderSave', state.token, response.finalizeJob)
                        .then(function () {
                            refreshBootstrap({ silent: true });
                        })
                        .catch(function () { });
                }
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function notifyWorkOrderSuppliers(workOrderId) {
            showEmailProgressToast();
            callServer('sendWorkOrderNotificationEmails', state.token, workOrderId)
                .then(function (response) {
                    showEmailResultToast(response && response.notificationSummary);
                })
                .catch(function (error) {
                    const message = error && error.message ? error.message : 'Unable to send supplier email notifications.';
                    flash('Email Failed', message, 'error', true);
                });
        }

        function showEmailProgressToast() {
            if (!window.Swal) {
                return;
            }
            Swal.close();
            Swal.fire({
                toast: true,
                position: 'top',
                icon: 'info',
                title: 'Sending Email',
                text: 'Sending email notifications to suppliers...',
                showConfirmButton: false,
                timer: undefined,
                timerProgressBar: false,
                customClass: {
                    popup: 'swal2-quotation-toast',
                    title: 'swal2-quotation-title'
                }
            });
        }

        function showEmailResultToast(notificationSummary) {
            const summary = notificationSummary || {};
            const notifiedCount = Number(summary.notifiedCount || 0);
            const failedCount = Number(summary.failedCount || 0);
            const recipientCount = Number(summary.recipientCount || 0);

            if (notifiedCount > 0 && failedCount > 0) {
                flash('Email Sent', 'Sent successfully to ' + notifiedCount + ' supplier(s). ' + failedCount + ' failed.', 'success', true);
                return;
            }
            if (notifiedCount > 0) {
                flash('Email Sent', 'Sent successfully to ' + notifiedCount + ' supplier(s).', 'success', true);
                return;
            }
            if (failedCount > 0) {
                flash('Email Failed', 'Unable to send supplier email notifications.', 'error', true);
                return;
            }
            flash('Email Skipped', recipientCount ? 'No supplier emails were sent.' : 'No active suppliers were available for email notification.', 'info', true);
        }

        function submitUserAccess(form) {

            payload.isActive = $(form).find('[name="isActive"]').is(':checked');

            callServer('saveUserAccess', state.token, payload).then(function (response) {
                closeVendorEditorModal();
                applyBootstrap(response.data, state.role, state.user);
                flash('Success', 'User access updated successfully.', 'success', true);
            }).catch(handleError).finally(function () {
                setLoading(false);
            });
        }

        function submitQuotation(form) {
            const quotationUploadError = getUploadBlockingMessage(state.newImages, 'product images');
            if (quotationUploadError) {
                flash('Upload Incomplete', quotationUploadError, 'error', true);
                return;
            }

        function refreshBootstrap(options) {
            const config = options || {};
            if (state.role === 'vendor') {
                return loadVendorWorkspaceData({
                    silent: config.silent,
                    suppressError: false,
                    invalidateSession: true,
                    showSuccess: false,
                    source: config.source
                });
            }
            if (!config.silent) {
                setLoading(true);
            }
            return callServer('getBootstrapData', state.token).then(function (response) {
                applyBootstrap(response.data, response.role, response.user, {
                    source: config.source || (config.silent ? 'background' : 'manual')
                });
            }).catch(function (error) {
                storageRemove(SESSION_KEY);
                storageRemove(SESSION_ROLE_KEY);
                stopBackgroundRefresh();
                state.token = '';
                state.role = '';
                state.user = null;
                state.data = null;
                flash('Error', error.message || 'Session expired', 'error', true);
                showAuthView();
            }).finally(function () {
                if (!config.silent) {
                    setLoading(false);
                }
            });
        }

        function applyBootstrap(data, role, user, options) {
            const previousData = state.data;
            state.data = data;
            state.role = role;
            state.user = user;
            storageSet(SESSION_ROLE_KEY, role || '');
            reconcileWorkOrderNotifications(previousData, data, options);
            startBackgroundRefresh();
            renderWorkspace();
        }

        function loadVendorWorkspaceData(options) {
            const config = options || {};
            if (!state.token || state.role !== 'vendor') {
                return Promise.resolve(null);
            }
            if (state.vendorLoadInFlight) {
                return Promise.resolve(null);
            }

            state.vendorLoadInFlight = true;
            if (!config.silent) {
                setLoading(true);
            }

            return callServer('getBootstrapData', state.token).then(function (response) {
                applyBootstrap(response.data, response.role || state.role, response.user || state.user, {
                    source: config.source || (config.silent ? 'background' : 'manual')
                });
                if (config.showSuccess) {
                    flash('Success', 'Workspace refreshed successfully.', 'success', true);
                }
                return response;
            }).catch(function (error) {
                if (config.invalidateSession) {
                    storageRemove(SESSION_KEY);
                    storageRemove(SESSION_ROLE_KEY);
                    stopBackgroundRefresh();
                    state.token = '';
                    state.role = '';
                    state.user = null;
                    state.data = null;
                    flash('Error', error.message || 'Session expired', 'error', true);
                    showAuthView();
                    return null;
                }
                if (!config.suppressError) {
                    handleError(error);
                }
                return null;
            }).finally(function () {
                state.vendorLoadInFlight = false;
                if (!config.silent) {
                    setLoading(false);
                }
            });
        }

        function startBackgroundRefresh() {
            if (!state.token || !state.role) {
                stopBackgroundRefresh();
                return;
            }
            if (state.bootstrapRefreshTimer) {
                return;
            }
            state.bootstrapRefreshTimer = window.setInterval(function () {
                if (!state.token || !state.data) {
                    return;
                }
                refreshBootstrap({ silent: true, source: 'background' });
            }, AUTO_REFRESH_INTERVAL_MS);
        }

        function stopBackgroundRefresh() {
            if (!state.bootstrapRefreshTimer) {
                return;
            }
            window.clearInterval(state.bootstrapRefreshTimer);
            state.bootstrapRefreshTimer = null;
        }

        function loadWorkOrderNotifications() {
            const raw = storageGet(WORK_ORDER_NOTIFICATION_STORAGE_KEY);
            if (!raw) {
                return {};
            }
            try {
                return normalizeWorkOrderNotifications(JSON.parse(raw));
            } catch (error) {
                return {};
            }
        }

        function normalizeWorkOrderNotifications(value) {
            const source = value && typeof value === 'object' ? value : {};
            return Object.keys(source).reduce(function (result, workOrderId) {
                const normalizedId = String(workOrderId || '').trim();
                const entry = source[workOrderId];
                if (!normalizedId || !entry || typeof entry !== 'object') {
                    return result;
                }
                const marker = String(entry.marker || '').trim();
                if (!marker) {
                    return result;
                }
                result[normalizedId] = {
                    marker: marker,
                    unread: entry.unread !== false
                };
                return result;
            }, {});
        }

        function persistWorkOrderNotifications() {
            const normalized = normalizeWorkOrderNotifications(state.workOrderNotifications);
            state.workOrderNotifications = normalized;
            if (!Object.keys(normalized).length) {
                storageRemove(WORK_ORDER_NOTIFICATION_STORAGE_KEY);
                return;
            }
            storageSet(WORK_ORDER_NOTIFICATION_STORAGE_KEY, JSON.stringify(normalized));
        }

        function reconcileWorkOrderNotifications(previousData, nextData, options) {
            const nextWorkOrders = Array.isArray(nextData && nextData.workOrders) ? nextData.workOrders : [];
            const existing = normalizeWorkOrderNotifications(state.workOrderNotifications);
            const nextNotifications = {};
            let newNotificationCount = 0;

            nextWorkOrders.forEach(function (workOrder) {
                const workOrderId = String(workOrder && workOrder.workOrderId || '').trim();
                if (workOrderId && existing[workOrderId]) {
                    nextNotifications[workOrderId] = existing[workOrderId];
                }
            });

            if (previousData && Array.isArray(previousData.workOrders)) {
                const previousById = previousData.workOrders.reduce(function (result, workOrder) {
                    const workOrderId = String(workOrder && workOrder.workOrderId || '').trim();
                    if (workOrderId) {
                        result[workOrderId] = workOrder;
                    }
                    return result;
                }, {});

                nextWorkOrders.forEach(function (workOrder) {
                    const workOrderId = String(workOrder && workOrder.workOrderId || '').trim();
                    if (!workOrderId || previousById[workOrderId]) {
                        return;
                    }
                    const marker = 'wo:' + String(workOrder.createdAt || workOrder.updatedAt || workOrder.workOrderNumber || workOrderId).trim();
                    if (!nextNotifications[workOrderId] || nextNotifications[workOrderId].marker !== marker) {
                        newNotificationCount += 1;
                    }
                    nextNotifications[workOrderId] = {
                        marker: marker,
                        unread: true
                    };
                });
            }

            state.workOrderNotifications = nextNotifications;
            persistWorkOrderNotifications();
            updateWorkOrderNotificationCounter();

            if (newNotificationCount && options && options.source === 'background') {
                showWorkOrderNotificationToast(
                    'New work order',
                    newNotificationCount === 1
                        ? 'A new work order is available.'
                        : String(newNotificationCount) + ' new work orders are available.'
                );
            }
        }

        function getUnreadWorkOrderNotificationCount() {
            return Object.keys(normalizeWorkOrderNotifications(state.workOrderNotifications)).reduce(function (count, workOrderId) {
                return count + (hasWorkOrderNotification(workOrderId) ? 1 : 0);
            }, 0);
        }

        function updateWorkOrderNotificationCounter() {
            const unreadCount = getUnreadWorkOrderNotificationCount();
            $('#workspaceTopNotificationCounter')
                .toggleClass('hidden', unreadCount <= 0)
                .text(unreadCount === 1 ? '1 new' : String(unreadCount) + ' new');
            $('#workspaceDrawerNotificationCounter')
                .toggleClass('hidden', unreadCount <= 0)
                .text(unreadCount === 1 ? '1 unread' : String(unreadCount) + ' unread');

            if (unreadCount <= 0) {
                dismissWorkOrderNotificationToast();
            }
        }

        function showWorkOrderNotificationToast(title, message) {
            const normalizedTitle = String(title || '').trim();
            const normalizedMessage = String(message || '').trim();
            if (!normalizedTitle && !normalizedMessage) {
                return;
            }
            if (!window.Swal) {
                return;
            }
            Swal.fire({
                toast: true,
                position: 'top',
                icon: 'info',
                title: normalizedTitle || 'New update',
                text: normalizedMessage,
                showConfirmButton: false,
                timer: undefined,
                timerProgressBar: false,
                customClass: {
                    popup: 'swal2-quotation-toast',
                    title: 'swal2-quotation-title'
                }
            });
        }

        function dismissWorkOrderNotificationToast(event) {
            if (!window.Swal || !Swal.isVisible()) {
                return;
            }
            const popup = Swal.getPopup();
            if (!popup || !popup.classList.contains('swal2-toast')) {
                return;
            }
            if (event && $(event.target).closest('.swal2-container, .swal2-popup').length) {
                return;
            }
            Swal.close();
        }

        function hasWorkOrderNotification(workOrderId) {
            const normalizedId = String(workOrderId || '').trim();
            return !!(normalizedId && state.workOrderNotifications && state.workOrderNotifications[normalizedId] && state.workOrderNotifications[normalizedId].unread);
        }

        function clearWorkOrderNotification(workOrderId) {
            const normalizedId = String(workOrderId || '').trim();
            if (!normalizedId || !state.workOrderNotifications || !state.workOrderNotifications[normalizedId]) {

        function renderLoadingTableRows(targetSelector, widths, rowCount, alignLastRight, cellClassName) {

                    const $bar = buildLoadingBar('h-4 ' + widthClass + (isLastColumn && alignLastRight ? ' ml-auto' : ''));
                    $cell.append($bar);
                    $row.append($cell);

                $target.append($row);

        function filterMyQuotations(quotations) {
            const items = Array.isArray(quotations) ? quotations : [];
            const query = String(state.myQuotationsSearchQuery || '').trim().toLowerCase();
            if (!query) {
                return items;
            }

            return items.filter(function (quote) {
                return [
                    quote && quote.quotationId,
                    quote && quote.workOrderNumber,
                    quote && quote.customerProject,
                    quote && quote.category,
                    quote && quote.status,
                    quote && quote.priceRange,
                    quote && quote.comment
                ].some(function (value) {
                    return String(value || '').toLowerCase().indexOf(query) !== -1;
                });
            });
        }

        function sortMyQuotations(quotations) {
            const items = Array.isArray(quotations) ? quotations.slice() : [];
            const sortKey = String(state.myQuotationsSortKey || 'updatedAt').trim();
            const sortDirection = state.myQuotationsSortDirection === 'asc' ? 1 : -1;

            return items.sort(function (left, right) {
                const comparison = compareMyQuotationValues(left, right, sortKey);
                if (comparison !== 0) {
                    return comparison * sortDirection;
                }
                return String(right && right.updatedAt || '').localeCompare(String(left && left.updatedAt || ''));
            });
        }

        function compareMyQuotationValues(left, right, sortKey) {
            if (sortKey === 'updatedAt' || sortKey === 'quotationDate') {
                return String(left && left[sortKey] || '').localeCompare(String(right && right[sortKey] || ''));
            }
            if (sortKey === 'targetPrice') {
                return Number(left && left.targetPrice || 0) - Number(right && right.targetPrice || 0);
            }
            return String(left && left[sortKey] || '').localeCompare(String(right && right[sortKey] || ''));
        }

        function updateMyQuotationsResultCount(filteredCount, totalCount) {
            const hasQuery = Boolean(String(state.myQuotationsSearchQuery || '').trim());
            const label = hasQuery
                ? String(filteredCount) + ' of ' + String(totalCount) + ' results'
                : String(filteredCount) + ' results';
            $('#myQuotationsResultCount').text(label);
        }

        function updateMyQuotationsSortIndicators() {

                    : 'arrow-up-down';

        function buildQuotationImageCard(image, options) {
            const config = options || {};

            });
            const $meta = $('<div>').addClass('min-w-0 flex-1');
            const $title = $('<p>').addClass('truncate text-sm font-semibold text-slate-800').text(image.name || 'Image');
            const $subtitle = $('<p>').addClass('mt-1 text-xs text-slate-500').text(buildUploadMetaLine(image, config.status));
            const $progress = renderUploadProgress(image, config.status, 'default');
            const $actions = $('<div>').addClass('mt-3 flex items-center gap-2');

            $actions.append(renderUploadStatusBadge(config.status, image));

            if (!isNew && (image.url || image.previewUrl || image.preview)) {
                $actions.append(
                    $('<button>')
                        .attr({
                            type: 'button',
                            'data-preview-image': image.preview || image.previewUrl || image.url || '',
                            'data-preview-title': image.name || 'Image preview'
                        })
                        .addClass('inline-flex rounded-full border border-slate-200 px-3 py-1.5 text-xs font-semibold text-slate-600')
                        .text('Open image')
                );
            }

            $actions.append(
                $('<button>')
                    .attr({ type: 'button' })
                    .attr(isNew ? 'data-remove-new-image' : 'data-remove-existing-image', config.index)
                    .addClass('inline-flex rounded-full border border-rose-200 px-3 py-1.5 text-xs font-semibold text-rose-600')
                    .text('Remove')
            );

            $meta.append($title, $subtitle);
            if ($progress) {

            $meta.append($actions);
            $card.append($preview, $meta);
            return $card;

                $card.find('[data-field="productionSpecs"]').append(

        function callServer(functionName) {
            console.log("ðŸš€ ~ callServer ~ functionName:", functionName)
            const args = Array.prototype.slice.call(arguments, 1);
            return new Promise(function (resolve, reject) {
                if (typeof google === 'undefined' || !google.script || !google.script.run) {
                    reject(new Error('google.script.run is not available in this context. Please open the deployed Apps Script web app URL.'));
                    return;
                }
                const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
                runner[functionName].apply(runner, args);
            });
        }

        function debounce_(callback, wait) {
            let timeoutId = null;
            return function () {
                const args = Array.prototype.slice.call(arguments);
                clearTimeout(timeoutId);
                timeoutId = setTimeout(function () {
                    callback.apply(null, args);
                }, wait);
            };
        }

        function queueImmediateUploads(scope, fileList) {
            const config = getUploadConfig(scope);
            const currentCount = config.getExistingCount() + config.getPendingList().length;
            const selectedFiles = Array.from(fileList || []);
            if (!selectedFiles.length) {
                return;
            }

            if (currentCount >= FILE_UPLOAD_LIMIT) {
                flash('Limit Reached', 'You can upload up to ' + FILE_UPLOAD_LIMIT + ' files.', 'error', true);
                return;
            }

            if (currentCount + selectedFiles.length > FILE_UPLOAD_LIMIT) {
                flash('Limit Reached', 'This selection exceeds the ' + FILE_UPLOAD_LIMIT + '-file limit, so the latest selection was not added.', 'error', true);
                config.render();
                return;
            }

            const queuedUploads = selectedFiles.map(function (file) {
                return enqueueImmediateUpload(scope, file);
            });
            config.render();

            callServer('getDriveUploadAuthContext', state.token, { scope: scope }).then(function (uploadAuthContext) {
                queuedUploads.forEach(function (queuedUpload) {
                    startImmediateUpload(scope, queuedUpload.file, queuedUpload.clientId, uploadAuthContext);
                });
                config.render();
            }).catch(function (error) {
                queuedUploads.forEach(function (queuedUpload) {
                    markPendingUploadError(scope, queuedUpload.clientId, error);
                });
                handleError(error);
            });
        }

        function enqueueImmediateUpload(scope, file) {
            const config = getUploadConfig(scope);
            const clientId = nextUploadClientId();
            const preview = createLocalUploadPreview(file);
            const entry = {
                clientId: clientId,
                name: file.name,
                type: file.type,
                contentType: file.type,
                sizeBytes: file.size || 0,
                totalBytes: file.size || 0,
                uploadedBytes: 0,
                uploadPercent: 0,
                preview: preview.preview,
                previewUrl: '',
                uploadStatus: 'PREPARING',
                isTemp: true,
                scope: scope,
                errorMessage: '',
                objectUrl: preview.objectUrl
            };

            config.getPendingList().push(entry);
            return {
                clientId: clientId,
                file: file
            };
        }

        function startImmediateUpload(scope, file, clientId, uploadAuthContext) {
            const config = getUploadConfig(scope);
            const currentEntry = findUploadEntry(config.getPendingList(), clientId);
            if (currentEntry) {
                currentEntry.uploadStatus = 'UPLOADING';
                currentEntry.errorMessage = '';
                config.render();
            }

            uploadFileToDriveSession(file, uploadAuthContext, function (progressState) {
                const uploadingEntry = findUploadEntry(config.getPendingList(), clientId);
                if (!uploadingEntry) {
                    return;
                }
                updateUploadEntryProgress(uploadingEntry, progressState);
                config.render();
            }).then(function (result) {
                const uploadedEntry = findUploadEntry(config.getPendingList(), clientId);
                if (!uploadedEntry) {
                    if (result && result.id) {
                        deleteUploadedFileSilently(result.id, 'REMOVED_DURING_UPLOAD');
                    }
                    return;
                }

                cleanupUploadPreview(uploadedEntry);
                $.extend(uploadedEntry, {
                    fileId: result.id,
                    name: result.name || uploadedEntry.name || file.name,
                    url: result.webViewLink || buildDriveOpenUrl(result.id),
                    preview: buildDrivePreviewUrl(result.id),
                    previewUrl: buildDrivePreviewUrl(result.id),
                    contentType: result.mimeType || uploadedEntry.contentType || file.type,
                    sizeBytes: Number(result.size || uploadedEntry.sizeBytes || file.size || 0),
                    uploadStatus: 'UPLOADED',
                    errorMessage: '',
                    uploadedBytes: Number(result.size || uploadedEntry.totalBytes || file.size || 0),
                    totalBytes: Number(result.size || uploadedEntry.totalBytes || file.size || 0),
                    uploadPercent: 100,
                    isTemp: true,
                    scope: scope,
                    objectUrl: ''
                });
                config.render();
            }).catch(function (error) {
                const failedEntry = findUploadEntry(config.getPendingList(), clientId);
                if (failedEntry) {
                    failedEntry.uploadStatus = 'ERROR';
                    failedEntry.errorMessage = getUploadErrorMessage(error);
                    config.render();
                }
                handleError(error);
            });
        }

        function markPendingUploadError(scope, clientId, error) {
            const config = getUploadConfig(scope);
            const failedEntry = findUploadEntry(config.getPendingList(), clientId);
            if (!failedEntry) {
                return;
            }
            failedEntry.uploadStatus = 'ERROR';
            failedEntry.errorMessage = getUploadErrorMessage(error);
            config.render();
        }

        function uploadFileToDriveSession(file, uploadAuthContext, onProgress) {
            return new Promise(function (resolve, reject) {
                const uploader = new ResumableUploadToGoogleDrive2();
                uploader.Do({
                    file: file,
                    accessToken: uploadAuthContext.accessToken,
                    folderId: uploadAuthContext.folderId,
                    fields: 'id,name,mimeType,size,webViewLink',
                    chunkSize: RESUMABLE_UPLOAD_CHUNK_SIZE
                }, function (result, error) {
                    if (error) {
                        reject(normalizeUploadError(error));
                        return;
                    }
                    if (!result) {
                        return;
                    }

                    if (typeof onProgress === 'function') {
                        onProgress(result);
                    }

                    if (result.status === 'Done') {
                        resolve(result.result || {});
                    }
                });
            });
        }

        function updateUploadEntryProgress(entry, progressState) {
            if (!entry || !progressState) {
                return;
            }

            if (progressState.status === 'initialize' || progressState.status === 'getLocation' || progressState.status === 'start') {
                entry.uploadStatus = 'UPLOADING';
                return;
            }

            if (progressState.status !== 'Uploading' || !progressState.progressByte) {
                return;
            }

            const totalBytes = Number(progressState.progressByte.total || entry.totalBytes || entry.sizeBytes || 0);
            const uploadedBytes = Math.min(totalBytes, Number(progressState.progressByte.end || -1) + 1);
            entry.uploadStatus = 'UPLOADING';
            entry.totalBytes = totalBytes;
            entry.uploadedBytes = Math.max(0, uploadedBytes);
            entry.uploadPercent = totalBytes > 0 ? Math.min(100, Math.round((entry.uploadedBytes / totalBytes) * 100)) : 0;
        }

        function createLocalUploadPreview(file) {
            if (!file || !isImageFile({ name: file.name, type: file.type, contentType: file.type })) {
                return { preview: '', objectUrl: '' };
            }

            if (typeof URL === 'undefined' || typeof URL.createObjectURL !== 'function') {
                return { preview: '', objectUrl: '' };
            }

            const objectUrl = URL.createObjectURL(file);
            return {
                preview: objectUrl,
                objectUrl: objectUrl
            };
        }

        function cleanupUploadPreview(entry) {
            if (!entry || !entry.objectUrl || typeof URL === 'undefined' || typeof URL.revokeObjectURL !== 'function') {
                return;
            }
            URL.revokeObjectURL(entry.objectUrl);
            entry.objectUrl = '';
        }

        function normalizeUploadError(error) {
            const message = getUploadErrorMessage(error);
            return error instanceof Error ? new Error(message) : new Error(message);
        }

        function getUploadErrorMessage(error) {
            if (!error) {
                return 'Upload failed.';
            }
            if (typeof error === 'string') {
                return error;
            }
            if (error.message) {
                return error.message;
            }
            if (error.Error) {
                return error.Error;
            }
            if (error.error && error.error.message) {
                return error.error.message;
            }
            return 'Upload failed.';
        }

        function getUploadConfig(scope) {
            if (scope === 'QUOTATION') {
                return {
                    getPendingList: function () { return state.newImages; },
                    getExistingCount: function () { return state.quotationDraft && Array.isArray(state.quotationDraft.images) ? state.quotationDraft.images.length : 0; },
                    render: renderQuotationPreviews,
                    pickerSelector: '#quotationUploadPickerWrap',
                    inputSelector: '#quotationImageInput',
                    limitNoticeSelector: '#quotationUploadLimitNotice',
                    clearButtonSelector: '#quotationRemoveAllBtn'
                };
            }
            return {
                getPendingList: function () { return state.newWorkOrderFiles; },
                getExistingCount: function () { return state.workOrderDraft && Array.isArray(state.workOrderDraft.attachments) ? state.workOrderDraft.attachments.length : 0; },
                render: renderWorkOrderAttachmentList,
                pickerSelector: '#workOrderUploadPickerWrap',
                inputSelector: '#workOrderFileInput',
                limitNoticeSelector: '#workOrderUploadLimitNotice',
                clearButtonSelector: '#workOrderRemoveAllBtn'
            };
        }

        function updateUploadPickerVisibility(scope, count) {
            const config = getUploadConfig(scope);
            const totalCount = Number(count || 0);
            $(config.pickerSelector).toggleClass('hidden', totalCount >= FILE_UPLOAD_LIMIT);
            $(config.limitNoticeSelector).toggleClass('hidden', totalCount < FILE_UPLOAD_LIMIT);
            $(config.clearButtonSelector).toggleClass('hidden', totalCount <= 0);
            if (totalCount >= FILE_UPLOAD_LIMIT) {
                $(config.inputSelector).val('');
            }
        }

        function clearAllUploads(scope) {
            if (scope === 'QUOTATION') {
                discardPendingUploads(state.newImages);
                state.newImages = [];
                if (state.quotationDraft && Array.isArray(state.quotationDraft.images)) {

                }
                $('#quotationImageInput').val('');

            }

            state.newWorkOrderFiles = [];

                state.workOrderDraft.attachments = [];

            renderWorkOrderAttachmentList();
        }

        function nextUploadClientId() {
            state.uploadSequence += 1;
            return 'upload-' + Date.now() + '-' + state.uploadSequence;
        }

        function findUploadEntry(list, clientId) {
            return (list || []).find(function (item) {
                return item && item.clientId === clientId;
            }) || null;
        }

        function normalizeUploadedEntries(list) {
            return (list || []).filter(function (item) {
                return item && item.uploadStatus === 'UPLOADED' && item.fileId;
            }).map(function (item) {
                return {
                    fileId: item.fileId,
                    name: item.name,
                    url: item.url,
                    previewUrl: item.previewUrl || item.preview || '',
                    contentType: item.contentType || item.type || '',
                    sizeBytes: item.sizeBytes || 0,
                    isTemp: item.isTemp === true,
                    scope: item.scope || ''
                };
            });
        }

        function getUploadBlockingMessage(list, label) {
            const uploads = list || [];
            if (uploads.some(function (item) { return item.uploadStatus === 'PREPARING' || item.uploadStatus === 'PENDING' || item.uploadStatus === 'UPLOADING'; })) {
                return 'Please wait for all ' + label + ' to finish uploading.';
            }
            if (uploads.some(function (item) { return item.uploadStatus === 'ERROR'; })) {
                return 'Some ' + label + ' failed to upload. Remove them or try again.';
            }
            return '';
        }

        function removePendingUploadAt(stateKey, index, renderFn) {
            const list = state[stateKey] || [];
            const item = list[index];
            if (!item) {
                return;
            }
            cleanupUploadPreview(item);
            list.splice(index, 1);
            if (item.fileId && item.isTemp) {
                deleteUploadedFileSilently(item.fileId, 'REMOVE_PENDING_UPLOAD');
            }
            renderFn();
        }

        function discardPendingUploads(list) {
            (list || []).forEach(function (item) {
                cleanupUploadPreview(item);
                if (item && item.fileId && item.isTemp) {
                    deleteUploadedFileSilently(item.fileId, 'DISCARD_PENDING_UPLOAD');
                }
            });
        }

        function deleteUploadedFileSilently(fileId, reason) {
            if (!state.token || !fileId) {
                return;
            }
            callServer('deleteUploadedFile', state.token, {
                fileId: fileId,
                reason: reason || 'DELETE_FILE'
            }).catch(function () { });
        }

        function flash(title, message, type, isToast, position) {
            const iconMap = {
                success: 'success',
                error: 'error',
                info: 'info'
            };

            if (!window.Swal) {
                return;
            }

            Swal.close();
            Swal.fire({
                toast: true,
                position: position || 'top-end',
                icon: iconMap[type] || 'info',
                title: title,
                text: message,
                showConfirmButton: false,
                timer: type === 'error' ? 4500 : 3200,
                timerProgressBar: true,
                customClass: {
                    popup: 'swal2-quotation-toast',
                    title: 'swal2-quotation-title'
                }
            });
        }

        function handleError(error) {
            const message = error && error.message ? error.message : 'An unexpected error occurred.';
            if (!state.token && !state.data && window.Swal) {
                Swal.fire({
                    icon: 'error',
                    title: 'Unable to Login',
                    text: message,
                    confirmButtonText: 'OK',
                    customClass: {
                        popup: 'swal2-quotation-modal',
                        title: 'swal2-quotation-title',
                        htmlContainer: 'swal2-quotation-html',
                        confirmButton: 'swal2-quotation-confirm'
                    }
                });
                return;
            }
            flash('Error', message, 'error', true);
        }

        function setLoading(value) {
            $('#loadingOverlay').toggleClass('hidden', !value).toggleClass('flex', !!value);
        }

        function formatCurrency(value, currency) {
            if (value === '' || value === null || value === undefined || Number.isNaN(Number(value))) {
                return '-';
            }
            return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(Number(value)) + ' ' + currency;
        }

        function formatDate(value) {
            if (!value) {
                return '-';
            }
            const parsed = moment(value);
            return parsed.isValid() ? parsed.format('D MMM YYYY') : value;
        }

        function renderStatusPill(status) {
            const normalized = String(status || '-').toUpperCase();
            const map = {
                OPEN: 'bg-teal-50 text-teal-700',
                PUBLISHED: 'bg-sky-50 text-sky-700',
                CLOSED: 'bg-slate-200 text-slate-700',
                SUBMITTED: 'bg-emerald-50 text-emerald-700',
                UPDATED: 'bg-amber-50 text-amber-700',
                ON_HOLD: 'bg-rose-50 text-rose-700',
                WAITING_SAMPLE: 'bg-fuchsia-50 text-fuchsia-700',
                NOT_AVAILABLE: 'bg-slate-100 text-slate-600'
            };
            return $('<span>').addClass('inline-flex rounded-full px-3 py-1 text-xs font-semibold ' + (map[normalized] || 'bg-slate-100 text-slate-600')).text(normalized);
        }

        function renderWorkOrderAttachmentList() {
            const $target = $('#workOrderAttachmentList').empty();
            const existingFiles = state.workOrderDraft && Array.isArray(state.workOrderDraft.attachments) ? state.workOrderDraft.attachments : [];
            const newFiles = state.newWorkOrderFiles || [];
            const totalCount = existingFiles.length + newFiles.length;
            updateUploadCounter('#workOrderUploadCounter', totalCount);
            updateUploadPickerVisibility('WORK_ORDER', totalCount);

            if (!existingFiles.length && !newFiles.length) {
                $target.append(
                    $('<div>')
                        .addClass('rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-500 md:col-span-2')
                        .text('No files attached yet.')
                );
                refreshIcons();
                return;
            }

            existingFiles.forEach(function (file, index) {
                $target.append(buildWorkOrderAttachmentCard(file, { index: index, isNew: false, status: 'UPLOADED' }));
            });

            newFiles.forEach(function (file, index) {
                $target.append(buildWorkOrderAttachmentCard(file, { index: index, isNew: true, status: file.uploadStatus || 'PENDING' }));
            });
            refreshIcons();
        }

        function buildWorkOrderAttachmentCard(file, options) {
            const config = options || {};
            const isNew = !!config.isNew;
            const $card = $('<div>').addClass('flex items-start gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3');
            const $icon = isImageFile(file)
                ? buildInlineImagePreview(file)
                : $('<span>').addClass('inline-flex h-10 w-10 flex-none items-center justify-center rounded-full bg-brand/10 text-brand').html('<i data-lucide="paperclip" class="h-4 w-4"></i>');
            const $meta = $('<div>').addClass('min-w-0 flex-1');
            const $title = $('<p>').addClass('truncate text-sm font-semibold text-slate-800').text(file.name || 'Attachment');
            const $subtitle = $('<p>').addClass('mt-1 text-xs text-slate-500').text(buildUploadMetaLine(file, config.status));
            const $progress = renderUploadProgress(file, config.status, 'default');
            const $actions = $('<div>').addClass('mt-3 flex items-center gap-2');

            $actions.append(renderUploadStatusBadge(config.status, file));

            if (!isNew && file.url) {
                $actions.append(
                    $('<a>')
                        .attr({ href: file.url, target: '_blank', rel: 'noopener noreferrer' })
                        .addClass('inline-flex rounded-full border border-slate-200 px-3 py-1.5 text-xs font-semibold text-slate-600')
                        .text('Open file')
                );
            }

            $actions.append(
                $('<button>')
                    .attr({ type: 'button' })
                    .attr(isNew ? 'data-remove-workorder-new-file' : 'data-remove-workorder-existing-file', config.index)
                    .addClass('inline-flex rounded-full border border-rose-200 px-3 py-1.5 text-xs font-semibold text-rose-600')
                    .text('Remove')
            );

            $meta.append($title, $subtitle);
            if ($progress) {
                $meta.append($progress);
            }
            $meta.append($actions);
            $card.append($icon, $meta);
            return $card;
        }

        function buildInlineImagePreview(file) {
            const previewSource = getFilePreviewSource(file);
            const $button = $('<button>')
                .attr({
                    type: 'button',
                    'data-preview-image': previewSource,
                    'data-preview-title': file.name || 'Image preview'
                })
                .addClass('flex h-16 w-16 flex-none items-center justify-center overflow-hidden rounded-2xl border border-slate-200 bg-slate-100');

            $button.append(
                $('<img>')
                    .attr({ src: previewSource, alt: file.name || 'Attachment preview' })
                    .addClass('h-full w-full object-cover')
            );

            return $button;
        }

        function getFilePreviewSource(file) {
            return String((file && (file.preview || file.previewUrl || file.url)) || '').trim();
        }

        function isImageFile(file) {
            const contentType = String(file && (file.contentType || file.type) || '').trim().toLowerCase();
            const fileName = String(file && file.name || '').trim().toLowerCase();
            return contentType.indexOf('image/') === 0 || /\.(png|jpe?g|gif|webp|bmp|svg|heic|heif)$/i.test(fileName);
        }

        function updateUploadCounter(selector, count) {
            $(selector).text(String(count || 0) + '/' + FILE_UPLOAD_LIMIT + ' files');
        }

        function buildUploadMetaLine(file, status) {
            const parts = [];
            if (file.contentType || file.type) {
                parts.push(String(file.contentType || file.type));
            }
            if (file.sizeBytes) {
                parts.push(formatFileSize(file.sizeBytes));
            }
            if (status === 'ERROR' && file.errorMessage) {
                parts.push(file.errorMessage);
            }
            return parts.join(' â€¢ ') || 'File ready';
        }

        function appendUploadProgress($target, file, status, tone) {
            const $progress = renderUploadProgress(file, status, tone);
            $target.empty();
            if ($progress) {
                $target.append($progress);
            }
        }

        function renderUploadProgress(file, status, tone) {
            const normalized = String(status || '').toUpperCase();
            if (normalized !== 'PREPARING' && normalized !== 'UPLOADING' && normalized !== 'PENDING') {
                return null;
            }

            const totalBytes = Number(file.totalBytes || file.sizeBytes || 0);
            const uploadedBytes = Number(file.uploadedBytes || 0);
            const percent = Math.max(0, Math.min(100, Number(file.uploadPercent || 0)));
            const isOverlay = String(tone || '').toLowerCase() === 'overlay';
            const $wrap = $('<div>').addClass('mt-2 space-y-1.5');
            const $track = $('<div>').addClass('h-1.5 overflow-hidden rounded-full ' + (isOverlay ? 'bg-white/20' : 'bg-slate-200'));
            const $bar = $('<div>').addClass('h-full rounded-full transition-all duration-150 ' + (isOverlay ? 'bg-white/90' : 'bg-brand')).css('width', percent + '%');
            const label = normalized === 'PREPARING'
                ? 'Preparing upload...'
                : totalBytes > 0
                ? (formatFileSize(uploadedBytes) + ' / ' + formatFileSize(totalBytes) + ' (' + percent + '%)')
                : (percent + '%');
            const textClass = isOverlay
                ? (normalized === 'PENDING' ? 'text-white/70' : 'text-white/80')
                : 'text-slate-500';
            const $label = $('<p>').addClass('text-[11px] ' + textClass).text(label);

            $track.append($bar);
            $wrap.append($track, $label);
            return $wrap;
        }

        function renderUploadStatusBadge(status, file) {
            const normalized = String(status || 'UPLOADED').toUpperCase();
            const percent = Math.max(0, Math.min(100, Number(file && file.uploadPercent || 0)));
            const map = {
                PREPARING: { classes: 'bg-indigo-50 text-indigo-700', icon: 'loader-circle', label: 'Preparing upload', spin: true },
                PENDING: { classes: 'bg-amber-50 text-amber-700', icon: 'clock-3', label: 'Pending upload', spin: false },
                UPLOADING: { classes: 'bg-sky-50 text-sky-700', icon: 'loader-circle', label: 'Uploading ' + percent + '%', spin: true },
                UPLOADED: { classes: 'bg-emerald-50 text-emerald-700', icon: 'check-circle-2', label: 'Uploaded', spin: false },
                ERROR: { classes: 'bg-rose-50 text-rose-700', icon: 'triangle-alert', label: 'Upload failed', spin: false }
            };
            const meta = map[normalized] || map.UPLOADED;
            const $badge = $('<span>').addClass('inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-semibold ' + meta.classes);
            const $icon = $('<i>').attr('data-lucide', meta.icon).addClass('h-3.5 w-3.5' + (meta.spin ? ' animate-spin' : ''));
            return $badge.append($icon, $('<span>').text(meta.label));
        }

        function buildDrivePreviewUrl(fileId) {
            const normalized = String(fileId || '').trim();
            return normalized ? ('https://drive.google.com/thumbnail?id=' + encodeURIComponent(normalized) + '&sz=w1600') : '';
        }

        function buildDriveOpenUrl(fileId) {
            const normalized = String(fileId || '').trim();
            return normalized ? ('https://drive.google.com/open?id=' + encodeURIComponent(normalized)) : '';
        }

        function updateWorkOrderStatusControl(status) {
            const normalized = String(status || 'OPEN').toUpperCase();
            const meta = getWorkOrderStatusMeta(normalized);
            const $control = $('#workOrderStatusControl');
            const $iconWrap = $('#workOrderStatusIconWrap');
            const $icon = $('#workOrderStatusIcon');
            const $select = $('#workOrderForm [name="status"]');

            $control.removeClass('border-teal-200 bg-teal-50/90 border-sky-200 bg-sky-50/90 border-rose-200 bg-rose-50/90 border-slate-300 bg-slate-100/90');
            $iconWrap.removeClass('bg-teal-100 text-teal-700 bg-sky-100 text-sky-700 bg-rose-100 text-rose-700 bg-slate-200 text-slate-700');
            $select.removeClass('text-teal-700 text-sky-700 text-rose-700 text-slate-700');

            $control.addClass(meta.controlClass);
            $iconWrap.addClass(meta.iconClass);
            $select.addClass(meta.textClass).val(normalized);
            $icon.attr('data-lucide', meta.icon);
            refreshIcons();
        }

        function getWorkOrderStatusMeta(status) {
            const map = {
                OPEN: {
                    icon: 'folder-open',
                    controlClass: 'border-teal-200 bg-teal-50/90',
                    iconClass: 'bg-teal-100 text-teal-700',
                    textClass: 'text-teal-700'
                },
                PUBLISHED: {
                    icon: 'send',
                    controlClass: 'border-sky-200 bg-sky-50/90',
                    iconClass: 'bg-sky-100 text-sky-700',
                    textClass: 'text-sky-700'
                },
                ON_HOLD: {
                    icon: 'pause',
                    controlClass: 'border-rose-200 bg-rose-50/90',
                    iconClass: 'bg-rose-100 text-rose-700',
                    textClass: 'text-rose-700'
                },
                CLOSED: {
                    icon: 'lock',
                    controlClass: 'border-slate-300 bg-slate-100/90',
                    iconClass: 'bg-slate-200 text-slate-700',
                    textClass: 'text-slate-700'
                }
            };
            return map[status] || map.OPEN;
        }

        function formatFileSize(value) {
            const size = Number(value || 0);
            if (!size) {
                return '';
            }
            if (size < 1024) {
                return size + ' B';
            }
            if (size < 1024 * 1024) {
                return (size / 1024).toFixed(1) + ' KB';
            }
            return (size / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function renderVendorStatusBadge(isActive) {
            const active = !!isActive;
            return $('<span>')
                .addClass('inline-flex items-center gap-1.5 rounded-full border px-3 py-1 text-xs font-semibold ' + (active ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : 'border-rose-200 bg-rose-50 text-rose-700'))
                .append(
                    $('<span>').addClass('h-2 w-2 rounded-full ' + (active ? 'bg-emerald-500' : 'bg-rose-500')),
                    document.createTextNode(active ? 'ACTIVE' : 'PENDING')
                );
        }

        function renderQuotationCountBadge(count) {
            return $('<span>')
                .addClass('inline-flex rounded-full bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700')
                .text(String(count || 0) + ' quotations');
        }

        function formatDateTime(value) {
            if (!value) {
                return '-';
            }
            if (/^\d{4}-\d{2}-\d{2}$/.test(String(value).trim())) {
                const parsedDateOnly = moment(value, 'YYYY-MM-DD', true);
                return parsedDateOnly.isValid() ? parsedDateOnly.format('D MMM YYYY') : value;
            }
            const parsed = moment(value);
            return parsed.isValid() ? parsed.format('D MMM YYYY, HH:mm') : value;
        }

        function refreshIcons() {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }
        }

        function buildUserLabel(user) {
            if (!user) {
                return '';
            }
            const baseName = user.displayName || user.username || '';
            return baseName + (user.vendorName ? ' â€¢ ' + user.vendorName : '');
        }

        function findById(list, field, value) {
            return (list || []).find(function (item) {
                return item && item[field] === value;
            }) || null;
        }

        function storageGet(key) {
            try {
                return window.localStorage ? window.localStorage.getItem(key) || '' : (memoryStorage[key] || '');
            } catch (error) {
                return memoryStorage[key] || '';
            }
        }

        function storageSet(key, value) {
            memoryStorage[key] = value || '';
            try {
                if (window.localStorage) {
                    window.localStorage.setItem(key, value || '');
                }
            } catch (error) { }
        }

        function storageRemove(key) {
            delete memoryStorage[key];
            try {
                if (window.localStorage) {
                    window.localStorage.removeItem(key);
                }
            } catch (error) { }
        }
        })();
    </script>
